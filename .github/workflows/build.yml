name: 🏗️ 构建 Windows exe

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:    # 也可以在 GitHub 网页上手动触发

jobs:
  build:
    name: 交叉编译 .exe
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐳 拉取 Docker 镜像
        run: |
          docker pull cdrx/pyinstaller-windows:python3.11

      - name: 🔨 构建 Windows exe
        run: |
          mkdir -p dist
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/dist:/output" \
            cdrx/pyinstaller-windows:python3.11 \
            bash -c "
              set -e
              echo '=== 📦 安装 PyInstaller ==='
              pip install pyinstaller --quiet

              echo '=== 🔨 正在打包 ==='
              cd /src
              pyinstaller \
                --onefile \
                --windowed \
                --name 'ItTakesTwo_ModelSwapper' \
                --noconsole \
                --noconfirm \
                --clean \
                --icon 'assets/icon.ico' \
                --add-data 'README.md;.' \
                --add-data 'ui;ui' \
                --add-data 'utils;utils' \
                --add-data 'assets;assets' \
                --hidden-import tkinter \
                --hidden-import tkinter.ttk \
                --hidden-import tkinter.filedialog \
                --hidden-import tkinter.messagebox \
                main.py

              echo '=== 📋 复制输出 ==='
              cp dist/ItTakesTwo_ModelSwapper.exe /output/
              echo '=== ✅ 构建完成 ==='
            "

      - name: 📎 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ItTakesTwo_ModelSwapper_${{ github.sha }}
          path: dist/ItTakesTwo_ModelSwapper.exe
          if-no-files-found: error

      - name: 📦 创建 Release（打标签时自动发布）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ItTakesTwo_ModelSwapper.exe
          generate_release_notes: true
