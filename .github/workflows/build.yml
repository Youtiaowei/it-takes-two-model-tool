name: 🏗️ 构建 Windows exe

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 编译 .exe
    runs-on: windows-latest  # 🪟 直接用 Windows runner，不用 Wine

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装 PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: 🔨 打包 exe
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "ItTakesTwo_ModelSwapper" `
            --noconsole `
            --noconfirm `
            --clean `
            --icon "assets/icon.ico" `
            --add-data "README.md;." `
            --add-data "ui;ui" `
            --add-data "utils;utils" `
            --add-data "assets;assets" `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.filedialog `
            --hidden-import tkinter.messagebox `
            main.py

      - name: 📎 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ItTakesTwo_ModelSwapper_${{ github.sha }}
          path: dist/ItTakesTwo_ModelSwapper.exe
          if-no-files-found: error

      - name: 📦 创建 Release（打标签时自动发布）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ItTakesTwo_ModelSwapper.exe
          generate_release_notes: true
